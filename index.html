const todayStr = () => new Date().toISOString().split("T")[0];
const fmtDate = d => { if(!d) return "—"; const dt=d?.toDate?d.toDate():new Date(d); return dt.toLocaleDateString("ar-SA",{year:"numeric",month:"short",day:"numeric"}); };
const fmtTime = d => { if(!d) return "—"; const dt=d?.toDate?d.toDate():new Date(d); return dt.toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit"}); };
const diffH = (a,b) => { if(!a||!b) return "0"; const da=a?.toDate?a.toDate():new Date(a), db=b?.toDate?b.toDate():new Date(b); return Math.max(0,(db-da)/3600000).toFixed(1); };
const genId = () => Math.random().toString(36).slice(2);

let toastTimer;
function toast(msg, type="success") {
  const el = document.getElementById("toast");
  const colors = {success:"#16a34a", error:"#dc2626", info:"#1e40af"};
  el.textContent = msg; el.style.background = colors[type]||colors.success;
  el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.style.display="none", 3500);
}

function badge(text, color="#16a34a") {
  return `<span class="badge" style="background:${color}20;color:${color}">${text}</span>`;
}
function statusBadge(s) {
  const m={present:["حاضر","#16a34a"],absent:["غائب","#dc2626"],late:["متأخر","#f97316"],onLeave:["إجازة","#1e40af"],pending:["معلق","#d97706"],approved:["موافق","#16a34a"],rejected:["مرفوض","#dc2626"]};
  const [t,c]=m[s]||[s,"#6b7280"]; return badge(t,c);
}

// Modal helper
function openModal(title, body, onConfirm) {
  document.getElementById("modal-overlay")?.remove();
  const div = document.createElement("div");
  div.id="modal-overlay"; div.className="modal-bg";
  div.innerHTML=`<div class="modal"><div class="modal-head"><h3 style="font-size:16px;font-weight:800;color:#1f2937">${title}</h3><button onclick="document.getElementById('modal-overlay').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#6b7280">✕</button></div><div style="padding:20px">${body}</div></div>`;
  div.addEventListener("click",e=>e.target===div&&div.remove());
  document.body.appendChild(div);
  if(onConfirm) div.querySelector("#mc")?.addEventListener("click",()=>{onConfirm();div.remove();});
}
window.closeModal = () => document.getElementById("modal-overlay")?.remove();

// ══════════════════════════════════════════════════════════
// 👤 USER DOC
// ══════════════════════════════════════════════════════════
async function ensureUserDoc(user, extraName=null) {
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);
  const isAdmin = ADMIN_EMAILS.includes(user.email);
  if(!snap.exists()) {
    await setDoc(ref, {
      uid:user.uid, email:user.email,
      name:extraName||user.displayName||user.email.split("@")[0],
      photo:user.photoURL||null,
      role: isAdmin?"admin":"employee",
      status: isAdmin?"active":"pending",
      department:"", jobTitle:"", phone:"", salary:0,
      joinDate:serverTimestamp(), createdAt:serverTimestamp(),
    });
  } else if(isAdmin && snap.data().role!=="admin") {
    await updateDoc(ref,{role:"admin",status:"active"});
  }
  return (await getDoc(ref)).data();
}

// ══════════════════════════════════════════════════════════
// 🔐 STATE
// ══════════════════════════════════════════════════════════
let STATE = { user:null, userDoc:null, adminTab:"dashboard", empTab:"home", reqFilter:"pending", repMonth:new Date().toISOString().slice(0,7), empMonth:new Date().toISOString().slice(0,7), empReqTab:"new", attDate:todayStr(), reqForm:{type:"leave",leaveType:"annual",fromDate:todayStr(),toDate:todayStr(),reason:"",amount:"",description:""} };

// ══════════════════════════════════════════════════════════
// 🔥 AUTH LISTENER
// ══════════════════════════════════════════════════════════
onAuthStateChanged(auth, async user => {
  if(user) {
    STATE.user = user;
    STATE.userDoc = await ensureUserDoc(user);
    onSnapshot(doc(db,"users",user.uid), s=>{ if(s.exists()){STATE.userDoc=s.data(); reRender(); }});
    reRender();
  } else {
    STATE.user=null; STATE.userDoc=null;
    renderLogin();
  }
});

function reRender() {
  if(!STATE.userDoc) return renderLogin();
  if(STATE.userDoc.status==="pending") return renderPending();
  if(STATE.userDoc.status==="rejected") return renderRejected();
  if(STATE.userDoc.role==="admin") return renderAdmin();
  renderEmployee();
}

// ══════════════════════════════════════════════════════════

function renderLogin() {
  document.getElementById("root").innerHTML = `

          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>

          <input id="auth-pass" type="password" placeholder="••••••••"/>
        </div>

}

let authMode = "login";
window.switchAuthTab = (mode) => {
  authMode = mode;
  const isReg = mode==="register";
  document.getElementById("reg-name-wrap").style.display = isReg?"block":"none";
  document.getElementById("forgot-wrap").style.display = isReg?"none":"block";
  document.getElementById("auth-submit").textContent = isReg?"✨ إنشاء حساب":"🔑 تسجيل الدخول";
  document.getElementById("tab-login").style.background = isReg?"transparent":"#fff";
  document.getElementById("tab-login").style.color = isReg?"#6b7280":"#16a34a";
  document.getElementById("tab-login").style.boxShadow = isReg?"none":"0 1px 6px rgba(0,0,0,.1)";
  document.getElementById("tab-reg").style.background = isReg?"#fff":"transparent";
  document.getElementById("tab-reg").style.color = isReg?"#16a34a":"#6b7280";
  document.getElementById("tab-reg").style.boxShadow = isReg?"0 1px 6px rgba(0,0,0,.1)":"none";
};

window.loginGoogle = async () => {
  try {
    const cred = await signInWithPopup(auth, googleProvider);
    await ensureUserDoc(cred.user);
  } catch(e) {
    showAuthError(e.code==="auth/popup-closed-by-user"?"تم إغلاق نافذة الدخول":e.message);
  }
};

window.submitAuth = async () => {
  const email = document.getElementById("auth-email").value.trim();
  const pass = document.getElementById("auth-pass").value;
  const name = document.getElementById("auth-name")?.value.trim();
  if(!email||!pass){showAuthError("يرجى ملء جميع الحقول");return;}
  const btn = document.getElementById("auth-submit");
  btn.disabled=true; btn.textContent="⏳ جاري التحميل...";
  try {
    if(authMode==="register") {
      if(!name){showAuthError("يرجى إدخال الاسم");btn.disabled=false;btn.textContent="✨ إنشاء حساب";return;}
      const cred = await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(cred.user,{displayName:name});
      await ensureUserDoc(cred.user,name);
    } else {
      await signInWithEmailAndPassword(auth,email,pass);
    }
  } catch(e) {
    const msgs={"auth/email-already-in-use":"هذا الإيميل مسجل مسبقاً","auth/wrong-password":"كلمة المرور خاطئة","auth/user-not-found":"المستخدم غير موجود","auth/weak-password":"كلمة المرور ضعيفة (6 أحرف على الأقل)","auth/invalid-email":"إيميل غير صحيح","auth/invalid-credential":"إيميل أو كلمة مرور خاطئة"};
    showAuthError(msgs[e.code]||e.message);
    btn.disabled=false; btn.textContent=authMode==="register"?"✨ إنشاء حساب":"🔑 تسجيل الدخول";
  }
};

window.resetPassword = async () => {
  const email = document.getElementById("auth-email").value.trim();
  if(!email){showAuthError("أدخل إيميلك أولاً");return;}
  try { await sendPasswordResetEmail(auth,email); toast("تم إرسال رابط إعادة التعيين لإيميلك ✅"); }
  catch(e){ showAuthError(e.message); }
};

function showAuthError(msg) {
  const el=document.getElementById("auth-error");
  if(el){el.style.display="block";el.textContent=msg;}
}

      <div style="width:200px;background:#fff;border-left:1px solid #e5e7eb;padding:16px 0;flex-shrink:0;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto">
        ${tabs.map(t=>`<button onclick="STATE.adminTab='${t.id}';renderAdmin()" style="display:flex;align-items:center;gap:10px;width:100%;padding:11px 20px;border:none;background:${STATE.adminTab===t.id?'#dcfce7':'transparent'};color:${STATE.adminTab===t.id?'#16a34a':'#374151'};font-weight:${STATE.adminTab===t.id?800:600};font-size:14px;cursor:pointer;text-align:right;border-right:3px solid ${STATE.adminTab===t.id?'#16a34a':'transparent'};transition:all .15s;font-family:'Cairo'"><span style="font-size:18px">${t.ic}</span><span>${t.l}</span></button>`).join("")}
      </div>
      <div id="admin-content" style="flex:1;padding:24px;overflow-y:auto;max-height:calc(100vh - 58px)">
        <div class="spinner" style="margin-top:60px"></div>
      </div>
    </div>
  </div>`;
  loadAdminTab();
}

function loadAdminTab() {
  const fns={dashboard:adminDashboard,attendance:adminAttendance,employees:adminEmployees,requests:adminRequests,reports:adminReports};
  (fns[STATE.adminTab]||adminDashboard)();
}

// ─── DASHBOARD ───────────────────────────────────────────

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
      ${[["إجمالي الموظفين",activeEmps.length,"👥","#1e40af","#dbeafe"],["حضور اليوم",present,"✅","#16a34a","#dcfce7"],["غياب اليوم",Math.max(0,activeEmps.length-present),"❌","#dc2626","#fee2e2"],["بانتظار الموافقة",pendingEmps.length,"⏳","#d97706","#fefce8"]].map(([l,v,ic,c,bg])=>`
      <div class="card" style="background:${bg};border:1px solid ${c}20">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:28px">${ic}</span><span style="font-size:28px;font-weight:900;color:${c}">${v}</span></div>
        <div style="font-size:13px;font-weight:700;color:${c}">${l}</div>
      </div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <h3 style="font-size:15px;font-weight:800;color:#1f2937;margin:0 0 16px">⏳ موظفون بانتظار الموافقة (${pendingEmps.length})</h3>
        ${pendingEmps.length===0?`<div style="text-align:center;padding:24px;color:#6b7280"><div style="font-size:32px;margin-bottom:8px">✅</div>لا يوجد طلبات معلقة</div>`
        :pendingEmps.map(u=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e5e7eb">
          <div><div style="font-size:14px;font-weight:700;color:#1f2937">${u.name}</div><div style="font-size:12px;color:#6b7280">${u.email}</div></div>
          <div style="display:flex;gap:6px">
            <button class="btn" style="background:#16a34a;color:#fff;font-size:12px;padding:5px 12px" onclick="approveUser('${u.uid}')">موافقة</button>
            <button class="btn" style="background:none;border:2px solid #dc2626;color:#dc2626;font-size:12px;padding:5px 12px" onclick="rejectUser('${u.uid}')">رفض</button>
          </div>
        </div>`).join("")}
      </div>
      <div class="card">
        <h3 style="font-size:15px;font-weight:800;color:#1f2937;margin:0 0 16px">📩 طلبات معلقة (${pendingReqs.length})</h3>
        ${pendingReqs.length===0?`<div style="text-align:center;padding:24px;color:#6b7280"><div style="font-size:32px;margin-bottom:8px">✅</div>لا يوجد طلبات معلقة</div>`
        :pendingReqs.slice(0,5).map(r=>`<div style="padding:10px 0;border-bottom:1px solid #e5e7eb">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:700;color:#1f2937">${r.employeeName}</span>${statusBadge("pending")}</div>
          <div style="font-size:12px;color:#6b7280">${r.type==="leave"?`إجازة: ${r.fromDate} ← ${r.toDate}`:r.type==="loan"?`سلفة: ${Number(r.amount||0).toLocaleString("ar")} ريال`:r.type==="custody"?`عهدة: ${r.description||""}`:r.type}</div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <button class="btn" style="background:#16a34a;color:#fff;font-size:11px;padding:4px 10px" onclick="approveReq('${r.id}')">✅ موافقة</button>
            <button class="btn" style="background:none;border:1.5px solid #dc2626;color:#dc2626;font-size:11px;padding:4px 10px" onclick="openRejectReq('${r.id}')">❌ رفض</button>

// ─── ATTENDANCE ──────────────────────────────────────────
function adminAttendance() {
  const el=document.getElementById("admin-content");
  let employees=[], attRecords=[];

  function render() {
    const date=STATE.attDate;
    const dayAtt=attRecords.filter(a=>a.date===date);
    const getAtt=uid=>dayAtt.find(a=>a.uid===uid);
    const summary=["present","absent","late","onLeave"].map(s=>{
      const c={present:"#16a34a",absent:"#dc2626",late:"#f97316",onLeave:"#1e40af"}[s];
      const bg={present:"#dcfce7",absent:"#fee2e2",late:"#ffedd5",onLeave:"#dbeafe"}[s];
      const lbl={present:"حاضر",absent:"غائب",late:"متأخر",onLeave:"إجازة"}[s];
      const cnt=s==="absent"?Math.max(0,employees.length-dayAtt.filter(a=>a.status!=="absent").length):dayAtt.filter(a=>a.status===s).length;
      return `<div style="flex:1;background:${bg};border-radius:12px;padding:12px 16px"><div style="font-size:20px;font-weight:900;color:${c}">${cnt}</div><div style="font-size:12px;font-weight:700;color:${c}">${lbl}</div></div>`;
    }).join("");

    el.innerHTML=`<div class="fade">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:900;color:#1f2937;margin:0">📋 الحضور والغياب</h2>
      <input type="date" value="${date}" onchange="STATE.attDate=this.value;adminAttendance()" style="border:1.5px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:14px"/>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:20px">${summary}</div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="overflow-x:auto">
        <table><thead><tr><th>الموظف</th><th>القسم</th><th>الحالة</th><th>حضور</th><th>انصراف</th><th>ساعات</th><th>إجراء</th></tr></thead>
        <tbody>${employees.length===0?`<tr><td colspan="7" style="text-align:center;padding:40px;color:#6b7280">لا يوجد موظفون نشطون</td></tr>`:
        employees.map(emp=>{
          const att=getAtt(emp.uid);
          return `<tr>
            <td><div style="font-weight:700;color:#1f2937">${emp.name}</div><div style="font-size:11px;color:#6b7280">${emp.email}</div></td>
            <td>${emp.department||"—"}</td>
            <td>${att?statusBadge(att.status):badge("لم يُسجَّل","#6b7280")}</td>
            <td style="font-family:monospace">${att?.checkIn?fmtTime(att.checkIn):"—"}</td>
            <td style="font-family:monospace">${att?.checkOut?fmtTime(att.checkOut):"—"}</td>
            <td>${att?.checkIn&&att?.checkOut?diffH(att.checkIn,att.checkOut)+"h":"—"}</td>
            <td><button class="btn" style="background:#16a34a;color:#fff;font-size:12px;padding:5px 12px" onclick="openMarkAtt('${emp.uid}','${emp.name}','${att?.status||"present"}','${att?.id||""}')">
              ${att?"تعديل":"تسجيل"}
            </button></td>
          </tr>`;
        }).join("")}
        </tbody></table>
      </div>
    </div>
    </div>`;
  }

  onSnapshot(query(collection(db,"users"),where("role","==","employee"),where("status","==","active")), snap=>{employees=snap.docs.map(d=>d.data());render();});
  onSnapshot(query(collection(db,"attendance"),where("date","==",STATE.attDate)), snap=>{attRecords=snap.docs.map(d=>({id:d.id,...d.data()}));render();});
}

window.openMarkAtt = (uid,name,currentStatus,attId) => {
  openModal(`تسجيل حضور: ${name}`,`
    <div style="margin-bottom:14px"><label>الحالة</label>
      <select id="m-st">${["present","absent","late","onLeave"].map(s=>`<option value="${s}" ${s===currentStatus?"selected":""}>${{present:"✅ حاضر",absent:"❌ غائب",late:"⏰ متأخر",onLeave:"🌴 إجازة"}[s]}</option>`).join("")}</select>
    </div>
    <div style="margin-bottom:14px"><label>ملاحظات</label><textarea id="m-note" rows="2" style="resize:none" placeholder="اختياري..."></textarea></div>
    <div style="display:flex;gap:10px">
      <button id="mc" class="btn" style="background:#16a34a;color:#fff;flex:1;justify-content:center">✅ حفظ</button>
      <button class="btn" style="background:none;border:2px solid #e5e7eb;color:#374151;flex:1;justify-content:center" onclick="closeModal()">إلغاء</button>
    </div>`,
    async ()=>{
      const status=document.getElementById("m-st").value;
      const notes=document.getElementById("m-note").value;
      const data={uid,date:STATE.attDate,status,notes,employeeName:name,markedBy:"admin",updatedAt:serverTimestamp()};
      if(attId) await updateDoc(doc(db,"attendance",attId),data);
      else await addDoc(collection(db,"attendance"),{...data,checkIn:serverTimestamp(),createdAt:serverTimestamp()});
      toast(`تم تسجيل الحضور لـ ${name} ✅`);
    });
};

// ─── REQUESTS ────────────────────────────────────────────
function adminRequests() {

  function loadReqs() {
    const f=STATE.reqFilter;
    const q=f==="all"?query(collection(db,"requests"),orderBy("createdAt","desc")):query(collection(db,"requests"),where("status","==",f),orderBy("createdAt","desc"));
    onSnapshot(q, snap=>{
      const reqs=snap.docs.map(d=>({id:d.id,...d.data()}));
      el.innerHTML=`<div class="fade">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2 style="font-size:20px;font-weight:900;color:#1f2937;margin:0">📩 الطلبات</h2>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
        ${["pending","approved","rejected","all"].map(v=>`<button onclick="STATE.reqFilter='${v}';adminRequests()" style="padding:7px 16px;border-radius:20px;border:none;cursor:pointer;background:${f===v?"#16a34a":"#f9fafb"};color:${f===v?"#fff":"#374151"};font-weight:700;font-size:13px;font-family:'Cairo'">${{pending:"⏳ معلق",approved:"✅ موافق",rejected:"❌ مرفوض",all:"الكل"}[v]}</button>`).join("")}
      </div>
      ${reqs.length===0?`<div style="text-align:center;padding:48px;color:#6b7280"><div style="font-size:48px;margin-bottom:12px">📭</div>لا توجد طلبات</div>`:
      reqs.map(r=>`<div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="display:flex;gap:12px;align-items:flex-start">
            <span style="font-size:28px">${ti[r.type]||"📄"}</span>
            <div>
              <div style="font-weight:800;color:#1f2937;font-size:14px;margin-bottom:4px">${r.employeeName} — ${tl[r.type]||r.type}</div>
              <div style="font-size:12px;color:#6b7280">
                ${r.type==="leave"?`${{"annual":"سنوية","sick":"مرضية","unpaid":"بدون راتب"}[r.leaveType]||""} | ${r.fromDate} ← ${r.toDate} (${r.days||"?"} أيام)`:
                r.type==="loan"?`المبلغ: ${Number(r.amount||0).toLocaleString("ar")} ريال`:
                r.type==="custody"?r.description:r.reason||""}
              </div>
              <div style="font-size:11px;color:#9ca3af;margin-top:4px">${fmtDate(r.createdAt)}</div>
            </div>
          </div>
          ${statusBadge(r.status)}
        </div>
        ${r.status==="pending"?`<div style="display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #e5e7eb">
          <button class="btn" style="background:#16a34a;color:#fff;font-size:13px;padding:7px 16px" onclick="approveReq('${r.id}')">✅ موافقة</button>
          <button class="btn" style="background:none;border:2px solid #dc2626;color:#dc2626;font-size:13px;padding:7px 16px" onclick="openRejectReq('${r.id}')">❌ رفض</button>
        </div>`:""}
        ${r.reviewNote?`<div style="margin-top:8px;font-size:12px;color:#dc2626;background:#fee2e2;border-radius:8px;padding:6px 10px">📝 ${r.reviewNote}</div>`:""}

      </div>`;
    });
  }

    el.innerHTML=`<div class="fade">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:900;color:#1f2937;margin:0">📈 التقارير</h2>

        <tbody>${employees.map(emp=>{
          const s=getStats(emp.uid);
          const total=s.present+s.late+s.absent+s.leave;

          const pc=pct>=80?"#16a34a":pct>=60?"#f97316":"#dc2626";
          return `<tr>
            <td><div style="font-weight:700">${emp.name}</div></td>
            <td>${emp.department||"—"}</td>

          </tr>`;
        }).join("")}</tbody></table>
      </div>
    </div>

  }

  onSnapshot(query(collection(db,"users"),where("role","==","employee"),where("status","==","active")), snap=>{employees=snap.docs.map(d=>d.data());render();});
  const start=STATE.repMonth+"-01";

  onSnapshot(query(collection(db,"attendance"),where("date",">=",start),where("date","<",end)), snap=>{attData=snap.docs.map(d=>d.data());render();});
}

window.exportCSV = async () => {
  const snap=await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js").then(m=>m.getDocs(query(collection(db,"users"),where("role","==","employee"),where("status","==","active"))));
  const emps=snap.docs.map(d=>d.data());
  const start=STATE.repMonth+"-01";
  const endDate=new Date(STATE.repMonth); endDate.setMonth(endDate.getMonth()+1);
  const attSnap=await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js").then(m=>m.getDocs(query(collection(db,"attendance"),where("date",">=",start),where("date","<",endDate.toISOString().slice(0,10)))));
  const attData=attSnap.docs.map(d=>d.data());
  let csv="\uFEFFالموظف,القسم,حاضر,متأخر,غياب,إجازة\n";
  emps.forEach(e=>{
    const r=attData.filter(a=>a.uid===e.uid);
    csv+=`${e.name},${e.department||""},${r.filter(a=>a.status==="present").length},${r.filter(a=>a.status==="late").length},${r.filter(a=>a.status==="absent").length},${r.filter(a=>a.status==="onLeave").length}\n`;
  });
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"})); a.download=`حضور_${STATE.repMonth}.csv`; a.click();
  toast("تم تصدير التقرير ✅");
};

window.doCheckIn = async () => {
  const uid=STATE.userDoc.uid;
  const snap=await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js").then(m=>m.getDocs(query(collection(db,"attendance"),where("uid","==",uid),where("date","==",todayStr()))));
  if(!snap.empty&&snap.docs[0].data().checkIn){toast("تم تسجيل حضورك مسبقاً","info");return;}
  const hour=new Date().getHours();
  const status=hour>=9?"late":"present";
  if(!snap.empty) await updateDoc(doc(db,"attendance",snap.docs[0].id),{checkIn:serverTimestamp(),status});
  else await addDoc(collection(db,"attendance"),{uid,employeeName:STATE.userDoc.name,date:todayStr(),status,checkIn:serverTimestamp(),createdAt:serverTimestamp()});
  toast(status==="late"?"تم تسجيل حضورك (متأخر) ⏰":"تم تسجيل حضورك ✅");
};

window.doCheckOut = async () => {
  const uid=STATE.userDoc.uid;
  const snap=await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js").then(m=>m.getDocs(query(collection(db,"attendance"),where("uid","==",uid),where("date","==",todayStr()))));
  if(snap.empty){toast("سجّل حضورك أولاً","info");return;}
  const att=snap.docs[0];
  if(att.data().checkOut){toast("تم تسجيل انصرافك مسبقاً","info");return;}
  await updateDoc(doc(db,"attendance",att.id),{checkOut:serverTimestamp()});
  toast("تم تسجيل انصرافك ✅");
};

          </div>
          <div style="font-size:12px;color:#374151;background:#f9fafb;border-radius:8px;padding:8px 12px">
            ${r.type==="leave"?`${r.fromDate} → ${r.toDate} (${r.days||"?"} أيام)`:r.type==="loan"?`المبلغ: ${Number(r.amount||0).toLocaleString("ar")} ريال`:r.type==="custody"?r.description:r.reason||""}
            ${r.reviewNote?`<div style="margin-top:4px;color:#dc2626">📝 ${r.reviewNote}</div>`:""}
          </div>
        </div>`).join("");
    });
  }
}

window.submitReq = async () => {
  const u=STATE.userDoc;
  const f=STATE.reqForm;
  const reason=document.getElementById("rreason")?.value||f.reason||"";
  const amount=document.getElementById("ramt")?.value||f.amount||"";
  const desc=document.getElementById("rdesc")?.value||f.description||"";
  const ltype=document.getElementById("rlt")?.value||f.leaveType||"annual";
  if(f.type!=="custody"&&f.type!=="overtime"&&!reason.trim()){toast("يرجى كتابة السبب","error");return;}
  const calcDays=(from,to)=>Math.max(1,Math.ceil((new Date(to)-new Date(from))/86400000)+1);
  const btn=document.getElementById("req-submit");
  btn.disabled=true; btn.textContent="⏳ جاري الإرسال...";
  try {
    await addDoc(collection(db,"requests"),{
      uid:u.uid, employeeName:u.name, employeeEmail:u.email,
      type:f.type, status:"pending", createdAt:serverTimestamp(),
      ...(f.type==="leave"?{leaveType:ltype,fromDate:f.fromDate,toDate:f.toDate,days:calcDays(f.fromDate,f.toDate),reason}:
          f.type==="loan"?{amount,reason}:
          f.type==="custody"?{description:desc,amount}:
          f.type==="overtime"?{date:f.fromDate,hours:amount,reason}:
          {date:f.fromDate,reason}),
    });
    toast("تم إرسال الطلب بنجاح ✅");
    STATE.reqForm={type:"leave",leaveType:"annual",fromDate:todayStr(),toDate:todayStr(),reason:"",amount:"",description:""};
    STATE.empReqTab="history";
    empRequests();
  } catch(e){ toast("خطأ: "+e.message,"error"); btn.disabled=false; btn.textContent="📨 إرسال الطلب"; }
};
