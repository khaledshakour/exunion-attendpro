const todayStr = () => new Date().toISOString().split("T")[0];
const fmtDate = d => { if(!d) return "—"; const dt=d?.toDate?d.toDate():new Date(d); return dt.toLocaleDateString("ar-SA",{year:"numeric",month:"short",day:"numeric"}); };
const fmtTime = d => { if(!d) return "—"; const dt=d?.toDate?d.toDate():new Date(d); return dt.toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit"}); };
const diffH = (a,b) => { if(!a||!b) return "0"; const da=a?.toDate?a.toDate():new Date(a), db=b?.toDate?b.toDate():new Date(b); return Math.max(0,(db-da)/3600000).toFixed(1); };
const genId = () => Math.random().toString(36).slice(2);

let toastTimer;
function toast(msg, type="success") {
  const el = document.getElementById("toast");
  const colors = {success:"#16a34a", error:"#dc2626", info:"#1e40af"};
  el.textContent = msg; el.style.background = colors[type]||colors.success;
  el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.style.display="none", 3500);
}

function badge(text, color="#16a34a") {
  return `<span class="badge" style="background:${color}20;color:${color}">${text}</span>`;
}
function statusBadge(s) {
  const m={present:["حاضر","#16a34a"],absent:["غائب","#dc2626"],late:["متأخر","#f97316"],onLeave:["إجازة","#1e40af"],pending:["معلق","#d97706"],approved:["موافق","#16a34a"],rejected:["مرفوض","#dc2626"]};
  const [t,c]=m[s]||[s,"#6b7280"]; return badge(t,c);
}

// Modal helper
function openModal(title, body, onConfirm) {
  document.getElementById("modal-overlay")?.remove();
  const div = document.createElement("div");
  div.id="modal-overlay"; div.className="modal-bg";
  div.innerHTML=`<div class="modal"><div class="modal-head"><h3 style="font-size:16px;font-weight:800;color:#1f2937">${title}</h3><button onclick="document.getElementById('modal-overlay').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#6b7280">✕</button></div><div style="padding:20px">${body}</div></div>`;
  div.addEventListener("click",e=>e.target===div&&div.remove());
  document.body.appendChild(div);
  if(onConfirm) div.querySelector("#mc")?.addEventListener("click",()=>{onConfirm();div.remove();});
}
window.closeModal = () => document.getElementById("modal-overlay")?.remove();

// ══════════════════════════════════════════════════════════
// 👤 USER DOC
// ══════════════════════════════════════════════════════════
async function ensureUserDoc(user, extraName=null) {
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);
  const isAdmin = ADMIN_EMAILS.includes(user.email);
  if(!snap.exists()) {
    await setDoc(ref, {
      uid:user.uid, email:user.email,
      name:extraName||user.displayName||user.email.split("@")[0],
      photo:user.photoURL||null,
      role: isAdmin?"admin":"employee",
      status: isAdmin?"active":"pending",
      department:"", jobTitle:"", phone:"", salary:0,
      joinDate:serverTimestamp(), createdAt:serverTimestamp(),
    });
  } else if(isAdmin && snap.data().role!=="admin") {
    await updateDoc(ref,{role:"admin",status:"active"});
  }
  return (await getDoc(ref)).data();
}

// ══════════════════════════════════════════════════════════
// 🔐 STATE
// ══════════════════════════════════════════════════════════
let STATE = { user:null, userDoc:null, adminTab:"dashboard", empTab:"home", reqFilter:"pending", repMonth:new Date().toISOString().slice(0,7), empMonth:new Date().toISOString().slice(0,7), empReqTab:"new", attDate:todayStr(), reqForm:{type:"leave",leaveType:"annual",fromDate:todayStr(),toDate:todayStr(),reason:"",amount:"",description:""} };

// ══════════════════════════════════════════════════════════
// 🔥 AUTH LISTENER
// ══════════════════════════════════════════════════════════
onAuthStateChanged(auth, async user => {
  if(user) {
    STATE.user = user;
    STATE.userDoc = await ensureUserDoc(user);
    onSnapshot(doc(db,"users",user.uid), s=>{ if(s.exists()){STATE.userDoc=s.data(); reRender(); }});
    reRender();
  } else {
    STATE.user=null; STATE.userDoc=null;
    renderLogin();
  }
});

function reRender() {
  if(!STATE.userDoc) return renderLogin();
  if(STATE.userDoc.status==="pending") return renderPending();
  if(STATE.userDoc.status==="rejected") return renderRejected();
  if(STATE.userDoc.role==="admin") return renderAdmin();
  renderEmployee();
}

function renderLogin() {
  document.getElementById("root").innerHTML = `

          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>

        </div>

        <div id="auth-error" style="display:none;background:#fee2e2;color:#dc2626;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:12px;text-align:center"></div>

}

let authMode = "login";
window.switchAuthTab = (mode) => {
  authMode = mode;
  const isReg = mode==="register";
  document.getElementById("reg-name-wrap").style.display = isReg?"block":"none";
  document.getElementById("forgot-wrap").style.display = isReg?"none":"block";
  document.getElementById("auth-submit").textContent = isReg?"✨ إنشاء حساب":"🔑 تسجيل الدخول";
  document.getElementById("tab-login").style.background = isReg?"transparent":"#fff";
  document.getElementById("tab-login").style.color = isReg?"#6b7280":"#16a34a";
  document.getElementById("tab-login").style.boxShadow = isReg?"none":"0 1px 6px rgba(0,0,0,.1)";
  document.getElementById("tab-reg").style.background = isReg?"#fff":"transparent";
  document.getElementById("tab-reg").style.color = isReg?"#16a34a":"#6b7280";
  document.getElementById("tab-reg").style.boxShadow = isReg?"0 1px 6px rgba(0,0,0,.1)":"none";
};

window.loginGoogle = async () => {
  try {
    const cred = await signInWithPopup(auth, googleProvider);
    await ensureUserDoc(cred.user);
  } catch(e) {
    showAuthError(e.code==="auth/popup-closed-by-user"?"تم إغلاق نافذة الدخول":e.message);
  }
};

window.submitAuth = async () => {
  const email = document.getElementById("auth-email").value.trim();
  const pass = document.getElementById("auth-pass").value;
  const name = document.getElementById("auth-name")?.value.trim();
  if(!email||!pass){showAuthError("يرجى ملء جميع الحقول");return;}
  const btn = document.getElementById("auth-submit");
  btn.disabled=true; btn.textContent="⏳ جاري التحميل...";
  try {
    if(authMode==="register") {
      if(!name){showAuthError("يرجى إدخال الاسم");btn.disabled=false;btn.textContent="✨ إنشاء حساب";return;}
      const cred = await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(cred.user,{displayName:name});
      await ensureUserDoc(cred.user,name);
    } else {
      await signInWithEmailAndPassword(auth,email,pass);
    }
  } catch(e) {
    const msgs={"auth/email-already-in-use":"هذا الإيميل مسجل مسبقاً","auth/wrong-password":"كلمة المرور خاطئة","auth/user-not-found":"المستخدم غير موجود","auth/weak-password":"كلمة المرور ضعيفة (6 أحرف على الأقل)","auth/invalid-email":"إيميل غير صحيح","auth/invalid-credential":"إيميل أو كلمة مرور خاطئة"};
    showAuthError(msgs[e.code]||e.message);
    btn.disabled=false; btn.textContent=authMode==="register"?"✨ إنشاء حساب":"🔑 تسجيل الدخول";
  }
};

window.resetPassword = async () => {
  const email = document.getElementById("auth-email").value.trim();
  if(!email){showAuthError("أدخل إيميلك أولاً");return;}
  try { await sendPasswordResetEmail(auth,email); toast("تم إرسال رابط إعادة التعيين لإيميلك ✅"); }
  catch(e){ showAuthError(e.message); }
};

function showAuthError(msg) {
  const el=document.getElementById("auth-error");
  if(el){el.style.display="block";el.textContent=msg;}
}

        <button onclick="doLogout()" style="border:1.5px solid #e5e7eb;background:none;color:#6b7280;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;border-radius:8px;font-family:Cairo,sans-serif">خروج</button>

    <div style="display:flex;flex:1;overflow:hidden">

        ${tabs.map(t=>`<button onclick="goAdminTab('${t.id}')" id="atab-${t.id}" style="display:flex;align-items:center;gap:10px;width:100%;padding:11px 20px;border:none;background:${STATE.adminTab===t.id?'#dcfce7':'transparent'};color:${STATE.adminTab===t.id?'#16a34a':'#374151'};font-weight:${STATE.adminTab===t.id?800:600};font-size:14px;cursor:pointer;text-align:right;border-right:3px solid ${STATE.adminTab===t.id?'#16a34a':'transparent'};transition:all .15s;font-family:Cairo,sans-serif"><span style="font-size:18px">${t.ic}</span><span>${t.l}</span></button>`).join("")}

window.goAdminTab = (tab) => {
  STATE.adminTab = tab;
  // Update sidebar styles
  document.querySelectorAll("[id^='atab-']").forEach(b=>{
    const isActive = b.id === "atab-"+tab;
    b.style.background = isActive?"#dcfce7":"transparent";
    b.style.color = isActive?"#16a34a":"#374151";
    b.style.fontWeight = isActive?"800":"600";
    b.style.borderRight = isActive?"3px solid #16a34a":"3px solid transparent";
  });
  loadAdminTab();
};

function loadAdminTab() {
  const fns={dashboard:adminDashboard,attendance:adminAttendance,employees:adminEmployees,requests:adminRequests,invoices:adminInvoices,reports:adminReports};
  (fns[STATE.adminTab]||adminDashboard)();
}

// ─── DASHBOARD ───────────────────────────────────────────

    el.innerHTML=`<div class="fade">
    <div style="margin-bottom:24px">
      <h2 style="font-size:22px;font-weight:900;color:#1f2937;margin:0">مرحباً، ${STATE.userDoc.name} 👋</h2>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
      ${[["إجمالي الموظفين",activeEmps.length,"👥","#1e40af","#dbeafe"],["حضور اليوم",present,"✅","#16a34a","#dcfce7"],["غياب اليوم",Math.max(0,activeEmps.length-present),"❌","#dc2626","#fee2e2"],["بانتظار الموافقة",pendingEmps.length,"⏳","#d97706","#fefce8"]].map(([l,v,ic,c,bg])=>`
      <div class="card" style="background:${bg};border:1px solid ${c}20">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:28px">${ic}</span><span style="font-size:28px;font-weight:900;color:${c}">${v}</span></div>
        <div style="font-size:13px;font-weight:700;color:${c}">${l}</div>
      </div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <h3 style="font-size:15px;font-weight:800;color:#1f2937;margin:0 0 16px">⏳ موظفون بانتظار الموافقة (${pendingEmps.length})</h3>
        ${pendingEmps.length===0?`<div style="text-align:center;padding:24px;color:#6b7280"><div style="font-size:32px;margin-bottom:8px">✅</div>لا يوجد طلبات معلقة</div>`
        :pendingEmps.map(u=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e5e7eb">
          <div><div style="font-size:14px;font-weight:700;color:#1f2937">${u.name}</div><div style="font-size:12px;color:#6b7280">${u.email}</div></div>
          <div style="display:flex;gap:6px">
            <button onclick="approveUser('${u.uid}')" style="background:#16a34a;color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif">موافقة</button>
            <button onclick="rejectUser('${u.uid}')" style="background:none;border:2px solid #dc2626;color:#dc2626;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif">رفض</button>
          </div>
        </div>`).join("")}
      </div>
      <div class="card">
        <h3 style="font-size:15px;font-weight:800;color:#1f2937;margin:0 0 16px">📩 طلبات معلقة (${pendingReqs.length})</h3>
        ${pendingReqs.length===0?`<div style="text-align:center;padding:24px;color:#6b7280"><div style="font-size:32px;margin-bottom:8px">✅</div>لا يوجد طلبات معلقة</div>`
        :pendingReqs.slice(0,5).map(r=>`<div style="padding:10px 0;border-bottom:1px solid #e5e7eb">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:700;color:#1f2937">${r.employeeName}</span>${statusBadge("pending")}</div>
          <div style="font-size:12px;color:#6b7280">${r.type==="leave"?`إجازة: ${r.fromDate} ← ${r.toDate}`:r.type==="loan"?`سلفة: ${Number(r.amount||0).toLocaleString("ar")} ريال`:r.type==="custody"?`عهدة: ${r.description||""}`:r.type}</div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <button onclick="approveReq('${r.id}')" style="background:#16a34a;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif">✅ موافقة</button>

          </div>
        </div>`).join("")}

  onSnapshot(collection(db,"users"), snap=>{allUsers=snap.docs.map(d=>d.data());render();});
  onSnapshot(query(collection(db,"attendance"),where("date","==",today)), snap=>{todayAtt=snap.docs.map(d=>d.data());render();});

// ─── ATTENDANCE ──────────────────────────────────────────
function adminAttendance() {
  const el=document.getElementById("admin-content");
  let employees=[], attRecords=[];

  function render() {
    const date=STATE.attDate||todayStr();
    const dayAtt=attRecords.filter(a=>a.date===date);
    const getAtt=uid=>dayAtt.find(a=>a.uid===uid);
    const counts={present:dayAtt.filter(a=>a.status==="present").length,late:dayAtt.filter(a=>a.status==="late").length,absent:Math.max(0,employees.length-dayAtt.filter(a=>a.status!=="absent").length),leave:dayAtt.filter(a=>a.status==="onLeave").length};
    el.innerHTML=`<div class="fade">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:900;color:#1f2937;margin:0">📋 الحضور والغياب</h2>
      <input type="date" value="${date}" onchange="STATE.attDate=this.value" style="border:1.5px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:14px"/>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:20px">
      ${[["✅","حاضر",counts.present,"#16a34a"],["⏰","متأخر",counts.late,"#f97316"],["❌","غياب",counts.absent,"#dc2626"],["🌴","إجازة",counts.leave,"#1e40af"]].map(([ic,l,v,c])=>`
      <div style="flex:1;background:${c}15;border-radius:12px;padding:12px 16px"><div style="font-size:20px;font-weight:900;color:${c}">${v}</div><div style="font-size:12px;font-weight:700;color:${c}">${ic} ${l}</div></div>`).join("")}
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="overflow-x:auto"><table><thead><tr><th>الموظف</th><th>القسم</th><th>المشروع</th><th>الحالة</th><th>حضور</th><th>انصراف</th><th>ساعات</th><th>إجراء</th></tr></thead>
      <tbody>${employees.length===0?`<tr><td colspan="8" style="text-align:center;padding:40px;color:#6b7280">لا يوجد موظفون نشطون</td></tr>`:
      employees.map(emp=>{
        const att=getAtt(emp.uid);
        return `<tr>
          <td><div style="font-weight:700;color:#1f2937">${emp.name}</div><div style="font-size:11px;color:#6b7280">${emp.email}</div></td>
          <td>${emp.department||"—"}</td>
          <td style="font-weight:700;color:#16a34a">${att?.projectCode||"—"}</td>
          <td>${att?statusBadge(att.status):badge("لم يُسجَّل","#6b7280")}</td>
          <td style="font-family:monospace">${att?.checkIn?fmtTime(att.checkIn):"—"}</td>
          <td style="font-family:monospace">${att?.checkOut?fmtTime(att.checkOut):"—"}</td>
          <td>${att?.checkIn&&att?.checkOut?diffH(att.checkIn,att.checkOut)+"h":"—"}</td>
          <td><button onclick="openMarkAtt('${emp.uid}','${emp.name}','${att?.status||"present"}','${att?.id||""}')" style="background:#16a34a;color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif">${att?"تعديل":"تسجيل"}</button></td>
        </tr>`;
      }).join("")}
      </tbody></table></div>
    </div></div>`;
  }

  onSnapshot(query(collection(db,"users"),where("role","==","employee"),where("status","==","active")), snap=>{employees=snap.docs.map(d=>d.data());render();});
  onSnapshot(collection(db,"attendance"), snap=>{attRecords=snap.docs.map(d=>({id:d.id,...d.data()}));render();});
}

window.openMarkAtt = (uid,name,currentStatus,attId) => {
  openModal(`تسجيل حضور: ${name}`,`
    <div style="margin-bottom:14px"><label>الحالة</label>
      <select id="m-st">${["present","absent","late","onLeave"].map(s=>`<option value="${s}" ${s===currentStatus?"selected":""}>${{present:"✅ حاضر",absent:"❌ غائب",late:"⏰ متأخر",onLeave:"🌴 إجازة"}[s]}</option>`).join("")}</select>
    </div>
    <div style="margin-bottom:14px"><label>كود المشروع</label><input id="m-proj" placeholder="PRJ-001"/></div>
    <div style="margin-bottom:14px"><label>ملاحظات</label><textarea id="m-note" rows="2" style="resize:none" placeholder="اختياري..."></textarea></div>
    <div style="display:flex;gap:10px">
      <button id="mc" class="btn" style="background:#16a34a;color:#fff;flex:1;justify-content:center">✅ حفظ</button>
      <button class="btn" style="background:none;border:2px solid #e5e7eb;color:#374151;flex:1;justify-content:center" onclick="closeModal()">إلغاء</button>
    </div>`,
    async ()=>{
      const status=document.getElementById("m-st").value;
      const notes=document.getElementById("m-note").value;
      const projectCode=document.getElementById("m-proj").value;
      const data={uid,date:STATE.attDate||todayStr(),status,notes,projectCode,employeeName:name,markedBy:"admin",updatedAt:serverTimestamp()};
      if(attId) await updateDoc(doc(db,"attendance",attId),data);
      else await addDoc(collection(db,"attendance"),{...data,checkIn:serverTimestamp(),createdAt:serverTimestamp()});
      toast(`تم تسجيل الحضور لـ ${name} ✅`);
    });
};

// ─── EMPLOYEES ───────────────────────────────────────────

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">

          <div style="flex:1;min-width:0"><div style="font-weight:800;color:#1f2937;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${emp.name}</div><div style="font-size:11px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${emp.email}</div></div>
          ${badge(sl[emp.status]||emp.status,sc[emp.status]||"#6b7280")}
        </div>
        <div style="font-size:12px;color:#374151;margin-bottom:12px;display:grid;gap:3px">
          ${emp.department?`<div>🏢 ${emp.department}</div>`:""}${emp.jobTitle?`<div>💼 ${emp.jobTitle}</div>`:""}${emp.salary?`<div>💰 ${Number(emp.salary).toLocaleString("ar")} ريال</div>`:""}
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="openEditEmp('${emp.uid}')" style="background:#1e40af;color:#fff;border:none;border-radius:8px;flex:1;padding:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif">✏️ تعديل</button>

        </div>
      </div>`).join("")}
    </div></div>`;
  });

// ─── REQUESTS ────────────────────────────────────────────
function adminRequests() {
  const el=document.getElementById("admin-content");
  const tl={leave:"إجازة",loan:"سلفة",custody:"عهدة",overtime:"إضافي",correction:"تصحيح"};
  const ti={leave:"🌴",loan:"💰",custody:"📦",overtime:"⏰",correction:"📝"};
  const f=STATE.reqFilter||"pending";

  const q=f==="all"?query(collection(db,"requests")):query(collection(db,"requests"),where("status","==",f));
  onSnapshot(q, snap=>{
    const reqs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{
      const ta=a.createdAt?.toDate?a.createdAt.toDate():new Date(0);
      const tb=b.createdAt?.toDate?b.createdAt.toDate():new Date(0);
      return tb-ta;
    });
    el.innerHTML=`<div class="fade">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:900;color:#1f2937;margin:0">📩 الطلبات</h2>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
      ${["pending","approved","rejected","all"].map(v=>`<button onclick="STATE.reqFilter='${v}';adminRequests()" style="padding:7px 16px;border-radius:20px;border:none;cursor:pointer;background:${f===v?"#16a34a":"#f9fafb"};color:${f===v?"#fff":"#374151"};font-weight:700;font-size:13px;font-family:Cairo,sans-serif">${{pending:"⏳ معلق",approved:"✅ موافق",rejected:"❌ مرفوض",all:"الكل"}[v]}</button>`).join("")}
    </div>
    ${reqs.length===0?`<div style="text-align:center;padding:48px;color:#6b7280"><div style="font-size:48px;margin-bottom:12px">📭</div>لا توجد طلبات</div>`:
    reqs.map(r=>`<div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <span style="font-size:28px">${ti[r.type]||"📄"}</span>
          <div>
            <div style="font-weight:800;color:#1f2937;font-size:14px;margin-bottom:4px">${r.employeeName} — ${tl[r.type]||r.type}</div>
            <div style="font-size:12px;color:#6b7280">${r.type==="leave"?`${{"annual":"سنوية","sick":"مرضية","unpaid":"بدون راتب"}[r.leaveType]||""} | ${r.fromDate} ← ${r.toDate}`:r.type==="loan"?`${Number(r.amount||0).toLocaleString("ar")} ريال`:r.type==="custody"?r.description:r.reason||""}</div>
            <div style="font-size:11px;color:#9ca3af;margin-top:4px">${fmtDate(r.createdAt)}</div>
          </div>
        </div>
        ${statusBadge(r.status)}
      </div>
      ${r.status==="pending"?`<div style="display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #e5e7eb">
        <button onclick="approveReq('${r.id}')" style="background:#16a34a;color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif">✅ موافقة</button>
        <button onclick="openRejectReq('${r.id}')" style="background:none;border:2px solid #dc2626;color:#dc2626;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif">❌ رفض</button>
      </div>`:""}
      ${r.reviewNote?`<div style="margin-top:8px;font-size:12px;color:#dc2626;background:#fee2e2;border-radius:8px;padding:6px 10px">📝 ${r.reviewNote}</div>`:""}
    </div>`).join("")}
    </div>`;
  });
}

      <div class="card" style="background:${bg};padding:16px"><div style="font-size:22px;font-weight:900;color:${c}">${v}</div><div style="font-size:12px;font-weight:700;color:${c}">${l}</div></div>`).join("")}

      <tbody>${employees.map(emp=>{
        const s=getStats(emp.uid);
        const total=s.present+s.late+s.absent+s.leave;
        const pct=total>0?Math.round(((s.present+s.late)/total)*100):0;
        const pc=pct>=80?"#16a34a":pct>=60?"#f97316":"#dc2626";
        return `<tr><td><div style="font-weight:700">${emp.name}</div></td><td>${emp.department||"—"}</td><td>${badge(s.present,"#16a34a")}</td><td>${badge(s.late,"#f97316")}</td><td>${badge(s.absent,"#dc2626")}</td><td>${badge(s.leave,"#1e40af")}</td>

  onSnapshot(query(collection(db,"users"),where("role","==","employee"),where("status","==","active")), snap=>{employees=snap.docs.map(d=>d.data());render();});
  onSnapshot(collection(db,"attendance"), snap=>{attData=snap.docs.map(d=>d.data()).filter(a=>a.date);render();});
}

window.exportCSV = async () => {
  const {getDocs:gd}=await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
  const emps=(await gd(query(collection(db,"users"),where("role","==","employee")))).docs.map(d=>d.data());
  const atts=(await gd(collection(db,"attendance"))).docs.map(d=>d.data()).filter(a=>a.date?.startsWith(STATE.repMonth));
  let csv="\uFEFFالموظف,القسم,حاضر,متأخر,غياب,إجازة\n";
  emps.forEach(e=>{
    const r=atts.filter(a=>a.uid===e.uid);
    csv+=`${e.name},${e.department||""},${r.filter(a=>a.status==="present").length},${r.filter(a=>a.status==="late").length},${r.filter(a=>a.status==="absent").length},${r.filter(a=>a.status==="onLeave").length}\n`;
  });
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"})); a.download=`حضور_${STATE.repMonth}.csv`; a.click();
  toast("تم تصدير التقرير ✅");
};

// ─── EMP ATTENDANCE ──────────────────────────────────────
function empAttendance() {
  const el=document.getElementById("emp-content");
  const uid=STATE.userDoc.uid;
  if(!STATE.attCalMonth) STATE.attCalMonth=new Date().toISOString().slice(0,7);
  if(!STATE.attFilter) STATE.attFilter="all";

  onSnapshot(query(collection(db,"attendance"),where("uid","==",uid)), snap=>{
    const all=snap.docs.map(d=>d.data());
    const month=STATE.attCalMonth;
    const records=all.filter(r=>r.date&&r.date.startsWith(month)).sort((a,b)=>b.date.localeCompare(a.date));
    const filtered=STATE.attFilter==="all"?records:records.filter(r=>r.status===STATE.attFilter);
    const stats={present:records.filter(r=>r.status==="present").length,late:records.filter(r=>r.status==="late").length,absent:records.filter(r=>r.status==="absent").length,leave:records.filter(r=>r.status==="onLeave").length};
    const dayColors={present:"#16a34a",late:"#f97316",absent:"#dc2626",onLeave:"#1e40af"};
    const attMap={};
    records.forEach(r=>attMap[r.date]=r);

    // Build calendar
    const [y,m]=month.split("-").map(Number);
    const firstDay=new Date(y,m-1,1).getDay();
    const daysInMonth=new Date(y,m,0).getDate();
    const dayNames=["ح","ن","ث","ر","خ","ج","س"];
    let calHtml=dayNames.map(d=>`<div style="text-align:center;font-size:10px;font-weight:800;color:#6b7280;padding:3px">${d}</div>`).join("");
    for(let i=0;i<firstDay;i++) calHtml+=`<div></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const rec=attMap[ds];
      const isToday=ds===todayStr();
      const color=rec?dayColors[rec.status]:null;
      calHtml+=`<div onclick="window._selDay='${ds}';document.getElementById('day-detail').innerHTML=getDayDetail('${ds}')" style="text-align:center;padding:5px 2px;border-radius:7px;cursor:pointer;background:${color?color+"20":"transparent"};border:2px solid ${isToday?"#16a34a":color?color:"transparent"};font-size:11px;font-weight:${isToday?900:600};color:${color||isToday?"#16a34a":"#374151"};">${d}</div>`;
    }

    window._attAll=all;
    el.innerHTML=`<div class="fade" style="padding:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">

// ─── EMP REQUESTS ────────────────────────────────────────
function empRequests() {
  const el=document.getElementById("emp-content");
  const uid=STATE.userDoc.uid;
  if(!STATE.empReqTab) STATE.empReqTab="new";
  if(!STATE.reqForm) STATE.reqForm={type:"leave",leaveType:"annual",fromDate:todayStr(),toDate:todayStr(),reason:"",amount:"",description:""};
  const tab=STATE.empReqTab;
  const f=STATE.reqForm;
  const calcDays=(a,b)=>Math.max(1,Math.ceil((new Date(b)-new Date(a))/86400000)+1);
  const reqTypes=[["leave","🌴","إجازة"],["loan","💰","سلفة"],["custody","📦","عهدة"],["overtime","⏰","إضافي"],["correction","📝","تصحيح"]];

  function buildForm() {
    return `
    <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
      ${reqTypes.map(([v,ic,l])=>`<button onclick="changeReqType('${v}')" style="padding:7px 12px;border-radius:20px;border:2px solid ${f.type===v?"#16a34a":"#e5e7eb"};background:${f.type===v?"#16a34a":"#fff"};color:${f.type===v?"#fff":"#374151"};font-weight:700;font-size:13px;cursor:pointer;font-family:Cairo,sans-serif">${ic} ${l}</button>`).join("")}
    </div>
    <div class="card" id="req-form-body">
      ${f.type==="leave"?`
        <div style="margin-bottom:12px"><label>نوع الإجازة</label><select id="rlt" style="background:#f9fafb">${[["annual","سنوية"],["sick","مرضية"],["unpaid","بدون راتب"]].map(([v,l])=>`<option value="${v}" ${f.leaveType===v?"selected":""}>${l}</option>`).join("")}</select></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">
          <div><label>من</label><input type="date" id="rfrom" value="${f.fromDate}"/></div>
          <div><label>إلى</label><input type="date" id="rto" value="${f.toDate}"/></div>
        </div>
        <div style="background:#dcfce7;border-radius:8px;padding:8px 12px;font-size:13px;color:#0f4c1e;font-weight:700;margin-bottom:12px">📅 ${calcDays(f.fromDate,f.toDate)} يوم</div>`
      :f.type==="loan"?`<div style="margin-bottom:12px"><label>المبلغ (ريال) *</label><input id="ramt" type="number" placeholder="0" value="${f.amount||""}"/></div>`
      :f.type==="custody"?`<div style="margin-bottom:12px"><label>وصف العهدة *</label><textarea id="rdesc" rows="3" style="resize:none">${f.description||""}</textarea></div><div style="margin-bottom:12px"><label>القيمة (ريال)</label><input id="ramt" type="number" placeholder="0" value="${f.amount||""}"/></div>`
      :f.type==="overtime"?`<div style="margin-bottom:12px"><label>التاريخ</label><input type="date" id="rfrom" value="${f.fromDate}"/></div><div style="margin-bottom:12px"><label>الساعات الإضافية</label><input id="ramt" type="number" placeholder="0" value="${f.amount||""}"/></div>`
      :`<div style="margin-bottom:12px"><label>تاريخ التصحيح</label><input type="date" id="rfrom" value="${f.fromDate}"/></div>`}
      ${f.type!=="custody"?`<div style="margin-bottom:14px"><label>السبب ${f.type!=="overtime"?"*":""}</label><textarea id="rreason" rows="3" style="resize:none" placeholder="اكتب السبب...">${f.reason||""}</textarea></div>`:""}
      <button id="req-submit" onclick="submitReq()" style="width:100%;padding:13px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:Cairo,sans-serif">📨 إرسال الطلب</button>
    </div>`;

    <button onclick="goReqTab('new')" style="flex:1;padding:9px;border-radius:9px;border:none;background:${tab==="new"?"#fff":"transparent"};color:${tab==="new"?"#16a34a":"#6b7280"};font-weight:800;font-size:14px;cursor:pointer;font-family:Cairo,sans-serif;box-shadow:${tab==="new"?"0 1px 6px rgba(0,0,0,.1)":"none"}">➕ طلب جديد</button>
    <button onclick="goReqTab('history')" style="flex:1;padding:9px;border-radius:9px;border:none;background:${tab==="history"?"#fff":"transparent"};color:${tab==="history"?"#16a34a":"#6b7280"};font-weight:800;font-size:14px;cursor:pointer;font-family:Cairo,sans-serif;box-shadow:${tab==="history"?"0 1px 6px rgba(0,0,0,.1)":"none"}">📋 طلباتي</button>
  </div>
  <div id="req-content">${tab==="new"?buildForm():`<div style="text-align:center;padding:30px"><div class="spinner"></div></div>`}</div>
  </div>`;

  if(tab==="history") {
    const tl={leave:"إجازة",loan:"سلفة",custody:"عهدة",overtime:"إضافي",correction:"تصحيح"};
    const ti={leave:"🌴",loan:"💰",custody:"📦",overtime:"⏰",correction:"📝"};
    onSnapshot(query(collection(db,"requests"),where("uid","==",uid)), snap=>{

          </div>
          ${statusBadge(r.status)}

        <div style="font-size:12px;color:#374151;background:#f9fafb;border-radius:8px;padding:8px 10px">
          ${r.type==="leave"?`${r.fromDate} → ${r.toDate} (${r.days||"?"} أيام)`:r.type==="loan"?`${Number(r.amount||0).toLocaleString("ar")} ريال`:r.type==="custody"?r.description:r.reason||""}

    });
  }
}

window.changeReqType = (type) => {
  STATE.reqForm={...STATE.reqForm,type};
  empRequests();
};
window.goReqTab = (tab) => { STATE.empReqTab=tab; empRequests(); };

window.submitReq = async () => {
  const u=STATE.userDoc; const f=STATE.reqForm;
  const reason=document.getElementById("rreason")?.value.trim()||"";
  const amount=document.getElementById("ramt")?.value||"";
  const desc=document.getElementById("rdesc")?.value.trim()||"";
  const ltype=document.getElementById("rlt")?.value||f.leaveType||"annual";
  const fromDate=document.getElementById("rfrom")?.value||f.fromDate||todayStr();
  const toDate=document.getElementById("rto")?.value||f.toDate||todayStr();
  if(f.type!=="custody"&&f.type!=="overtime"&&!reason){toast("يرجى كتابة السبب","error");return;}
  const calcDays=(a,b)=>Math.max(1,Math.ceil((new Date(b)-new Date(a))/86400000)+1);
  const btn=document.getElementById("req-submit");
  if(btn){btn.disabled=true;btn.textContent="⏳ جاري الإرسال...";}
  try{
    await addDoc(collection(db,"requests"),{uid:u.uid,employeeName:u.name,employeeEmail:u.email,type:f.type,status:"pending",createdAt:serverTimestamp(),
      ...(f.type==="leave"?{leaveType:ltype,fromDate,toDate,days:calcDays(fromDate,toDate),reason}:f.type==="loan"?{amount,reason}:f.type==="custody"?{description:desc,amount}:f.type==="overtime"?{date:fromDate,hours:amount,reason}:{date:fromDate,reason})});
    toast("تم إرسال الطلب ✅");
    STATE.reqForm={type:"leave",leaveType:"annual",fromDate:todayStr(),toDate:todayStr(),reason:"",amount:"",description:""};
    STATE.empReqTab="history"; empRequests();
  }catch(e){toast("خطأ: "+e.message,"error");if(btn){btn.disabled=false;btn.textContent="📨 إرسال الطلب";}}
};

window.submitInvoice = async () => {
  const u=STATE.userDoc;
  const desc=document.getElementById("inv-desc")?.value.trim();
  const amount=document.getElementById("inv-amount")?.value;
  const ref=document.getElementById("inv-ref")?.value.trim();
  const type=document.getElementById("inv-type")?.value||"invoice";
  if(!desc){toast("يرجى كتابة وصف الفاتورة","error");return;}
  if(!amount||Number(amount)<=0){toast("يرجى إدخال مبلغ صحيح","error");return;}
  const btn=document.getElementById("inv-submit");
  if(btn){btn.disabled=true;btn.textContent="⏳ جاري الإرسال...";}
  try{
    // Get admin email from settings
    const settingsSnap=await getDoc(doc(db,"settings","admin"));
    const adminEmail=settingsSnap.exists()?settingsSnap.data().invoiceEmail||"admin@exunion.co":"admin@exunion.co";
    // Save to Firestore
    await addDoc(collection(db,"invoices"),{
      uid:u.uid, employeeName:u.name, employeeEmail:u.email,
      invoiceType:type, description:desc, amount:Number(amount),
      refNumber:ref||"", status:"pending",
      adminEmail, createdAt:serverTimestamp()
    });
    // Open mailto to send email
    const subject=encodeURIComponent(`فاتورة من ${u.name} - ${type==="custody"?"عهدة":"فاتورة"}`);
    const body=encodeURIComponent(`مرحباً،\n\nتم تسليم ${type==="custody"?"عهدة":"فاتورة"} جديدة:\n\nالموظف: ${u.name}\nالبريد: ${u.email}\nالنوع: ${type==="custody"?"عهدة":"فاتورة"}\nالوصف: ${desc}\nالمبلغ: ${Number(amount).toLocaleString("ar")} ريال${ref?"\nالمرجع: "+ref:""}\nالتاريخ: ${new Date().toLocaleDateString("ar-SA")}\n\nتم الإرسال عبر Exunion AttendPro`);
    window.open(`mailto:${adminEmail}?subject=${subject}&body=${body}`,"_blank");
    toast("تم إرسال الفاتورة بنجاح! ✅");
    STATE.invTab="history"; empInvoice();
  }catch(e){toast("خطأ: "+e.message,"error");if(btn){btn.disabled=false;btn.textContent="📤 تسليم الفاتورة";}}
};

  el.innerHTML=`<div class="fade" style="padding:16px">
  <div class="card" style="text-align:center;padding:28px;margin-bottom:16px">
    <div style="width:72px;height:72px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;border:3px solid #16a34a;overflow:hidden">
      ${u.photo?`<img src="${u.photo}" style="width:100%;height:100%;object-fit:cover">`:"👤"}
    </div>
    <div style="font-size:18px;font-weight:900;color:#1f2937">${u.name}</div>
    <div style="font-size:13px;color:#6b7280">${u.email}</div>
    <div style="margin-top:10px">${badge(u.status==="active"?"نشط ✅":"معلق",u.status==="active"?"#16a34a":"#f97316")}</div>
  </div>
  <div class="card" style="margin-bottom:16px;padding:0;overflow:hidden">
    ${[["📧","البريد الإلكتروني",u.email],["🏢","القسم",u.department||"—"],["💼","المسمى الوظيفي",u.jobTitle||"—"],["📱","الهاتف",u.phone||"—"],["💰","الراتب",u.salary?Number(u.salary).toLocaleString("ar")+" ريال":"—"],["📅","تاريخ الالتحاق",fmtDate(u.joinDate)]].map(([ic,l,v],i,arr)=>`
    <div style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:${i<arr.length-1?"1px solid #e5e7eb":"none"}">
      <span style="font-size:18px;width:24px;text-align:center">${ic}</span>
      <div><div style="font-size:11px;color:#6b7280">${l}</div><div style="font-size:14px;font-weight:700;color:#1f2937">${v}</div></div>
    </div>`).join("")}
  </div>
  <button onclick="doLogout()" style="background:none;border:2px solid #dc2626;color:#dc2626;width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:Cairo,sans-serif">🚪 تسجيل الخروج</button>
  </div>`;
}

</script>
