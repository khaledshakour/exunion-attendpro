<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#16a34a"/>
<title>Exunion AttendPro</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Cairo",sans-serif}
body{background:#f1f5f9;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#16a34a;border-radius:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade{animation:fadeIn .3s ease}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 16px rgba(0,0,0,.07)}
input,select,textarea{font-family:"Cairo";font-size:14px;color:#1f2937;outline:none;width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;background:#fff;box-sizing:border-box;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,.1)}
label{display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:5px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;font-weight:800;color:#374151;text-align:right;background:#f8fafc;border-bottom:2px solid #e5e7eb;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #f1f5f9;color:#374151;vertical-align:middle}
tr:hover td{background:#f8fafc}
.badge{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-block}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:20px;width:100%;max-width:520px;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:#fff;z-index:1}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);color:#fff;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.25);max-width:340px;text-align:center;animation:slideUp .3s ease;pointer-events:none;display:none}
.spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:#16a34a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.sidebar-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 18px;border:none;cursor:pointer;text-align:right;transition:all .15s;font-family:"Cairo",sans-serif;font-size:13px;font-weight:600;background:transparent;color:#374151;border-right:3px solid transparent}
.sidebar-btn.active{background:#f0fdf4;color:#16a34a;font-weight:800;border-right-color:#16a34a}
.sidebar-btn:hover:not(.active){background:#f8fafc}
.tab-pill{display:flex;background:#f1f5f9;border-radius:12px;padding:4px;gap:3px;margin-bottom:16px}
.tab-pill button{flex:1;padding:8px;border-radius:9px;border:none;font-weight:700;font-size:13px;cursor:pointer;font-family:"Cairo",sans-serif;transition:all .2s}
.tab-pill .active-tab{background:#fff;color:#16a34a;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.tab-pill .inactive-tab{background:transparent;color:#6b7280}
.stat-card{border-radius:16px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.btn-primary{background:linear-gradient(135deg,#16a34a,#0f4c1e);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:"Cairo",sans-serif;transition:all .15s}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-secondary{background:#fff;color:#374151;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:"Cairo",sans-serif}
.btn-danger{background:#dc2626;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:"Cairo",sans-serif}
[dir="ltr"] th{text-align:left}
@media print{.no-print{display:none!important}.print-only{display:block!important}}
.print-only{display:none}
</style>
</head>

async function ensureUserDoc(user,xName=null){

}

        </div>
        ${pendingReqs.length===0?`<div style="text-align:center;padding:20px;color:#6b7280"><div style="font-size:28px;margin-bottom:6px">✅</div>${LANG==="ar"?"لا يوجد":"None"}</div>`

      const present7=labels7.map((_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);const ds=d.toISOString().split("T")[0];return todayAtt.filter(a=>a.date===ds&&(a.status==="present"||a.status==="late")).length;});
      const late7=labels7.map((_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);const ds=d.toISOString().split("T")[0];return todayAtt.filter(a=>a.date===ds&&a.status==="late").length;});
      const tc=document.getElementById("dash-trend-chart");

      const pc=document.getElementById("dash-pie-chart");
      if(pc&&window.Chart){if(pc._chart)pc._chart.destroy();pc._chart=new Chart(pc,{type:"doughnut",data:{labels:[t("present"),t("late"),t("absent"),t("leave")],datasets:[{data:[present-late,late,absent,todayAtt.filter(a=>a.status==="onLeave").length],backgroundColor:["#16a34a","#f97316","#dc2626","#1e40af"]}]},options:{responsive:true,plugins:{legend:{position:"bottom"}}}});}
    }catch(e){}
  }
  onSnapshot(collection(db,"users"),s=>{allUsers=s.docs.map(d=>d.data());render();});
  onSnapshot(query(collection(db,"attendance"),where("date",">=",new Date(Date.now()-7*86400000).toISOString().split("T")[0])),s=>{todayAtt=s.docs.map(d=>d.data());render();});
  onSnapshot(query(collection(db,"requests"),where("status","==","pending")),s=>{pendingReqs=s.docs.map(d=>({id:d.id,...d.data()}));render();});
}

          <td><div style="font-weight:700;color:#1f2937">${emp.name}</div><div style="font-size:11px;color:#9ca3af">${emp.email}</div></td>

// ── ADMIN PAYROLL ─────────────────────────────────────────
function adminPayroll(){
  const el=document.getElementById("admin-content");
  const month=STATE.payrollMonth||new Date().toISOString().slice(0,7);
  let emps=[],atts=[];
  function calcPayroll(emp){
    const empAtts=atts.filter(a=>a.uid===emp.uid&&a.date?.startsWith(month));
    const presentDays=empAtts.filter(a=>a.status==="present"||a.status==="late").length;
    const absentDays=empAtts.filter(a=>a.status==="absent").length;
    const lateMin=empAtts.filter(a=>a.status==="late").length*15;
    const workDays=22;const dailyRate=(emp.salary||0)/workDays;
    const absDeduct=absentDays*dailyRate;const lateDeduct=(lateMin/60)*dailyRate*0.5;
    const otHours=empAtts.reduce((s,a)=>{if(a.checkIn&&a.checkOut){const h=Number(diffH(a.checkIn,a.checkOut));return h>8?s+(h-8):s;}return s;},0);
    const hourlyRate=(emp.salary||0)/176;const otPay=otHours*(emp.overtimeRate||1.5)*hourlyRate;
    const basic=emp.salary||0;const housing=emp.housing||0;const transport=emp.transport||0;
    const gross=basic+housing+transport+otPay;const net=Math.max(0,gross-absDeduct-lateDeduct);
    return{presentDays,absentDays,lateMin,otHours:otHours.toFixed(1),basic,housing,transport,otPay:otPay.toFixed(0),absDeduct:absDeduct.toFixed(0),lateDeduct:lateDeduct.toFixed(0),gross:gross.toFixed(0),net:net.toFixed(0)};
  }

        <button onclick="exportPayrollPDF()" class="btn-secondary" style="padding:7px 14px;font-size:12px">📄 PDF</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
      <div class="stat-card" style="background:#dcfce7"><div><div style="font-size:22px;font-weight:900;color:#16a34a">${numFmt(totalNet)}</div><div style="font-size:12px;color:#16a34a;font-weight:700">SAR — ${t("netSalary")}</div></div><span style="font-size:32px">💰</span></div>
      <div class="stat-card" style="background:#dbeafe"><div><div style="font-size:22px;font-weight:900;color:#1e40af">${emps.length}</div><div style="font-size:12px;color:#1e40af;font-weight:700">${LANG==="ar"?"موظف نشط":"Active Employees"}</div></div><span style="font-size:32px">👥</span></div>
      <div class="stat-card" style="background:#ede9fe"><div><div style="font-size:22px;font-weight:900;color:#7c3aed">${numFmt(Math.round(totalNet/Math.max(1,emps.length)))}</div><div style="font-size:12px;color:#7c3aed;font-weight:700">${LANG==="ar"?"متوسط الراتب":"Avg Salary"}</div></div><span style="font-size:32px">📊</span></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden" id="payroll-table">
      <div style="overflow-x:auto"><table>

function adminReports(){

      </div>
      <div class="card">
        <h3 style="font-size:14px;font-weight:800;color:#1f2937;margin-bottom:14px">🍩 ${LANG==="ar"?"توزيع الشهر":"Month Distribution"}</h3>
        <canvas id="rep-pie" height="140"></canvas>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden" id="rep-table">
      <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9"><h3 style="margin:0;font-size:14px;font-weight:800;color:#1f2937">${LANG==="ar"?"تقرير الموظفين":"Employee Report"} — ${month}</h3></div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>${LANG==="ar"?"الموظف":"Employee"}</th><th>${LANG==="ar"?"القسم":"Dept"}</th><th>✅</th><th>⏰</th><th>❌</th><th>🌴</th><th>${LANG==="ar"?"نسبة الحضور":"Attendance %"}</th></tr></thead>

    }catch(e){}

}

// ── EMP ATTENDANCE ────────────────────────────────────────
function empAttendance(){
  const el=document.getElementById("emp-content");
  const uid=STATE.userDoc.uid;
  if(!STATE.attCalMonth)STATE.attCalMonth=new Date().toISOString().slice(0,7);
  if(!STATE.attFilter)STATE.attFilter="all";
  onSnapshot(query(collection(db,"attendance"),where("uid","==",uid)),snap=>{
    const all=snap.docs.map(d=>d.data());
    const month=STATE.attCalMonth;
    const records=all.filter(r=>r.date?.startsWith(month)).sort((a,b)=>b.date.localeCompare(a.date));
    const filtered=STATE.attFilter==="all"?records:records.filter(r=>r.status===STATE.attFilter);
    const stats={present:records.filter(r=>r.status==="present").length,late:records.filter(r=>r.status==="late").length,absent:records.filter(r=>r.status==="absent").length,leave:records.filter(r=>r.status==="onLeave").length};
    const dc={present:"#16a34a",late:"#f97316",absent:"#dc2626",onLeave:"#1e40af"};
    const am={};records.forEach(r=>am[r.date]=r);
    const[y,m]=month.split("-").map(Number);
    const fd=new Date(y,m-1,1).getDay();
    const dim=new Date(y,m,0).getDate();
    const dn=LANG==="ar"?["ح","ن","ث","ر","خ","ج","س"]:["Su","Mo","Tu","We","Th","Fr","Sa"];
    let cal=dn.map(d=>`<div style="text-align:center;font-size:10px;font-weight:800;color:#9ca3af;padding:3px">${d}</div>`).join("");
    for(let i=0;i<fd;i++)cal+=`<div></div>`;
    for(let d=1;d<=dim;d++){const ds=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;const rec=am[ds];const isT=ds===todayStr();const col=rec?dc[rec.status]:null;cal+=`<div onclick="window._selDay='${ds}';document.getElementById('day-det').innerHTML=getDayDet('${ds}')" style="text-align:center;padding:4px 2px;border-radius:7px;cursor:pointer;background:${col?col+"20":"transparent"};border:2px solid ${isT?"#16a34a":col?col:"transparent"};font-size:11px;font-weight:${isT?900:600};color:${col||isT?"#16a34a":"#374151"}">${d}</div>`;}
    window._attAll=all;
    el.innerHTML=`<div class="fade" style="padding:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0;font-size:15px;font-weight:900;color:#1f2937">📋 ${t("myAtt")}</h3>
      <div style="display:flex;align-items:center;gap:6px">
        <button onclick="prevAttM()" style="width:26px;height:26px;border-radius:50%;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;font-size:15px">‹</button>
        <span style="font-size:12px;font-weight:700;white-space:nowrap">${new Date(y,m-1).toLocaleDateString(LANG==="ar"?"ar-SA":"en-US",{month:"long",year:"numeric"})}</span>
        <button onclick="nextAttM()" style="width:26px;height:26px;border-radius:50%;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;font-size:15px">›</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px">
      ${[["✅",stats.present,LANG==="ar"?"حاضر":"Present","#16a34a","present"],["⏰",stats.late,LANG==="ar"?"متأخر":"Late","#f97316","late"],["❌",stats.absent,LANG==="ar"?"غياب":"Absent","#dc2626","absent"],["🌴",stats.leave,LANG==="ar"?"إجازة":"Leave","#1e40af","onLeave"]].map(([ic,v,l,c,k])=>`<div onclick="STATE.attFilter=STATE.attFilter==='${k}'?'all':'${k}';empAttendance()" style="padding:8px 4px;text-align:center;background:${STATE.attFilter===k?c:c+"15"};border-radius:10px;cursor:pointer;border:2px solid ${STATE.attFilter===k?c:"transparent"}"><div style="font-size:13px">${ic}</div><div style="font-size:16px;font-weight:900;color:${STATE.attFilter===k?"#fff":c}">${v}</div><div style="font-size:9px;color:${STATE.attFilter===k?"#fff":c};font-weight:700">${l}</div></div>`).join("")}
    </div>
    <div class="card" style="padding:10px;margin-bottom:12px"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cal}</div></div>
    <div id="day-det" style="margin-bottom:12px"></div>
    <div style="margin-bottom:6px;font-size:12px;font-weight:800;color:#1f2937">${STATE.attFilter==="all"?(LANG==="ar"?"جميع السجلات":"All Records")+" ("+records.length+")":records.length+" "+LANG==="ar"?"سجل":"records"}</div>
    ${filtered.map(r=>`<div class="card" style="margin-bottom:8px;padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;color:#1f2937;font-size:13px">${new Date(r.date+"T12:00:00").toLocaleDateString(LANG==="ar"?"ar-SA":"en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px">${r.checkIn?"🕐"+fmtTime(r.checkIn):"—"}${r.checkOut?" 🕔"+fmtTime(r.checkOut):""}${r.checkIn&&r.checkOut?" ("+diffH(r.checkIn,r.checkOut)+"h)":""}</div>
          ${r.projectCode?`<div style="font-size:10px;color:#16a34a;font-weight:700">🏗️ ${r.projectCode}</div>`:""}
        </div>
        ${statusBadge(r.status)}
      </div>
    </div>`).join("")||`<div style="text-align:center;padding:28px;color:#6b7280"><div style="font-size:32px;margin-bottom:8px">📭</div>${t("noData")}</div>`}
    </div>`;
  });
}
window.getDayDet=(ds)=>{const all=window._attAll||[];const r=all.find(x=>x.date===ds);if(!r)return`<div style="background:#f8fafc;border-radius:10px;padding:10px 14px;font-size:12px;color:#6b7280;text-align:center">${LANG==="ar"?"لا يوجد تسجيل":"No record"} — ${new Date(ds+"T12:00:00").toLocaleDateString(LANG==="ar"?"ar-SA":"en-US",{weekday:"long",day:"numeric",month:"long"})}</div>`;return`<div class="card" style="padding:12px;border:2px solid #16a34a20"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div style="font-weight:800;font-size:13px;color:#1f2937">${new Date(ds+"T12:00:00").toLocaleDateString(LANG==="ar"?"ar-SA":"en-US",{weekday:"long",day:"numeric",month:"long"})}</div>${statusBadge(r.status)}</div><div style="display:flex;gap:14px;flex-wrap:wrap;font-size:12px">${r.checkIn?`<div>🕐 <strong>${fmtTime(r.checkIn)}</strong></div>`:""}${r.checkOut?`<div>🕔 <strong>${fmtTime(r.checkOut)}</strong></div>`:""}${r.checkIn&&r.checkOut?`<div>⏱ <strong>${diffH(r.checkIn,r.checkOut)}h</strong></div>`:""}${r.projectCode?`<div>🏗️ <strong style="color:#16a34a">${r.projectCode}</strong></div>`:""}</div></div>`;};

    :`<div style="margin-bottom:10px"><label>${LANG==="ar"?"تاريخ التصحيح":"Date to Fix"}</label><input type="date" id="rfrom" value="${f.fromDate}"/></div>`}
    ${f.type!=="custody"?`<div style="margin-bottom:12px"><label>${LANG==="ar"?"السبب":"Reason"} ${f.type!=="overtime"?"*":""}</label><textarea id="rreason" rows="3" style="resize:none">${f.reason||""}</textarea></div>`:""}

            <div><div style="font-weight:800;font-size:13px;color:#1f2937">${inv.description||LANG==="ar"?"فاتورة":"Invoice"}</div><div style="font-size:11px;color:#9ca3af">${fmtDate(inv.createdAt)}${inv.refNumber?" · "+inv.refNumber:""}</div></div>
          </div>
          ${statusBadge(inv.status||"pending")}
        </div>
        <div style="font-size:18px;font-weight:900;color:#16a34a">${numFmt(inv.amount)} SAR</div>
        ${inv.fileData?`<div style="margin-top:6px"><a href="${inv.fileData}" target="_blank" style="font-size:12px;color:#1e40af;font-weight:700">📎 ${LANG==="ar"?"عرض المرفق":"View Attachment"}</a></div>`:""}
      </div>`).join("")}`;
    });
  }
}
window.previewInvFile=(input)=>{if(input.files&&input.files[0]){const f=input.files[0];document.getElementById("inv-file-name").textContent=`✅ ${f.name} (${(f.size/1024).toFixed(0)} KB)`;}};
window.submitInvoice=async()=>{
  const u=STATE.userDoc;
  const desc=document.getElementById("inv-desc")?.value.trim();
  const amount=document.getElementById("inv-amount")?.value;
  const ref=document.getElementById("inv-ref")?.value.trim();
  const type=document.getElementById("inv-type")?.value||"invoice";
  const fileInput=document.getElementById("inv-file");
  if(!desc){toast(LANG==="ar"?"يرجى كتابة الوصف":"Enter description","error");return;}
  if(!amount||Number(amount)<=0){toast(LANG==="ar"?"يرجى إدخال مبلغ صحيح":"Enter valid amount","error");return;}
  const btn=document.getElementById("inv-submit");if(btn){btn.disabled=true;btn.textContent="⏳...";}
  try{
    let fileData=null;
    if(fileInput?.files[0]){
      fileData=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(fileInput.files[0]);});
    }
    const settSnap=await getDoc(doc(db,"settings","admin"));
    const adminEmail=settSnap.exists()?settSnap.data().invoiceEmail||"admin@exunion.co":"admin@exunion.co";
    await addDoc(collection(db,"invoices"),{uid:u.uid,employeeName:u.name,employeeEmail:u.email,invoiceType:type,description:desc,amount:Number(amount),refNumber:ref||"",status:"pending",adminEmail,fileData:fileData||null,createdAt:serverTimestamp()});
    const subj=encodeURIComponent(`${LANG==="ar"?"فاتورة من":"Invoice from"} ${u.name} - ${type==="custody"?"Custody":"Invoice"}`);
    const body=encodeURIComponent(`${LANG==="ar"?"مرحباً,\n\nتم إرسال":"Hello,\n\nNew"} ${type==="custody"?(LANG==="ar"?"عهدة":"custody"):(LANG==="ar"?"فاتورة":"invoice")} ${LANG==="ar"?"جديدة":"submitted"}\n\n${LANG==="ar"?"الموظف":"Employee"}: ${u.name}\n${LANG==="ar"?"الوصف":"Desc"}: ${desc}\n${LANG==="ar"?"المبلغ":"Amount"}: ${numFmt(Number(amount))} SAR${ref?"\nRef: "+ref:""}\n\nExunion AttendPro`);
    window.open(`mailto:${adminEmail}?subject=${subj}&body=${body}`,"_blank");
    toast(LANG==="ar"?"تم إرسال الفاتورة ✅":"Invoice submitted ✅");
    STATE.invTab="history";empInvoice();
  }catch(e){toast("Error: "+e.message,"error");if(btn){btn.disabled=false;btn.textContent="📤 "+(LANG==="ar"?"تسليم الفاتورة":"Submit Invoice");}}
};

// ── EMP CLAIMS ────────────────────────────────────────────
function empClaims(){
  const el=document.getElementById("emp-content");
  const uid=STATE.userDoc.uid;
  if(!STATE.claimTab)STATE.claimTab="new";
  const tab=STATE.claimTab;
  el.innerHTML=`<div class="fade" style="padding:14px">
  <div class="tab-pill">${[["new",LANG==="ar"?"➕ كليم جديد":"➕ New Claim"],["history",LANG==="ar"?"📋 كليماتي":"📋 My Claims"]].map(([v,l])=>`<button onclick="STATE.claimTab='${v}';empClaims()" class="${tab===v?"active-tab":"inactive-tab"}">${l}</button>`).join("")}</div>
  <div id="claim-content">${tab==="new"?`
    <div class="card">
      <h3 style="font-size:15px;font-weight:800;color:#1f2937;margin-bottom:14px">📑 ${LANG==="ar"?"مطالبة دفع سريع":"Quick Payment Claim"}</h3>
      <div style="margin-bottom:12px"><label>${t("claimVal")} (SAR) *</label><input id="cl-val" type="number" placeholder="0" style="font-size:18px;font-weight:700;text-align:center"/></div>
      <div style="margin-bottom:12px"><label>${t("claimDays")} *</label><input id="cl-days" type="number" placeholder="${LANG==="ar"?"عدد الأيام":"Number of days"}"/></div>
      <div style="margin-bottom:12px"><label>${t("projCode")} *</label><input id="cl-proj" placeholder="PRJ-001"/></div>
      <div style="margin-bottom:12px"><label>${LANG==="ar"?"تاريخ الكليم":"Claim Date"} *</label><input id="cl-date" type="date" value="${todayStr()}"/></div>
      <div style="margin-bottom:14px"><label>${LANG==="ar"?"وصف / ملاحظات":"Description / Notes"}</label><textarea id="cl-desc" rows="3" style="resize:none" placeholder="${LANG==="ar"?"وصف المطالبة...":"Claim details..."}"></textarea></div>
      <button onclick="submitClaim()" id="cl-submit" class="btn-primary" style="width:100%;padding:13px;font-size:15px">📤 ${LANG==="ar"?"إرسال المطالبة":"Submit Claim"}</button>
    </div>`:`<div style="text-align:center;padding:28px"><div class="spinner"></div></div>`}
  </div></div>`;
  if(tab==="history"){
    onSnapshot(query(collection(db,"claims"),where("uid","==",uid)),s=>{
      const claims=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.toDate?b.createdAt.toDate():new Date(0))-(a.createdAt?.toDate?a.createdAt.toDate():new Date(0)));
      const rc=document.getElementById("claim-content");if(!rc)return;
      rc.innerHTML=claims.length===0?`<div style="text-align:center;padding:40px;color:#6b7280"><div style="font-size:40px;margin-bottom:10px">📭</div>${t("noData")}</div>`
      :claims.map(c=>`<div class="card" style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div><div style="font-weight:800;font-size:14px;color:#1f2937">${numFmt(c.value)} SAR</div><div style="font-size:11px;color:#9ca3af;margin-top:2px">${c.claimDate||fmtDate(c.createdAt)}</div></div>
          <span style="background:#1e40af20;color:#1e40af;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">${c.projectCode||"—"}</span>
        </div>
        <div style="display:flex;gap:12px;font-size:12px;color:#374151;margin-bottom:8px">
          <span>📅 ${c.days||"—"} ${LANG==="ar"?"يوم":"days"}</span>
          ${c.description?`<span>📝 ${c.description}</span>`:""}
        </div>
        <button onclick="printMyClaim('${c.id}')" class="btn-secondary" style="padding:5px 12px;font-size:12px">🖨️ ${t("printClaim")}</button>
      </div>`).join("");
    });
  }
}
window.submitClaim=async()=>{
  const u=STATE.userDoc;
  const val=document.getElementById("cl-val")?.value;
  const days=document.getElementById("cl-days")?.value;
  const proj=document.getElementById("cl-proj")?.value.trim();
  const date=document.getElementById("cl-date")?.value;
  const desc=document.getElementById("cl-desc")?.value.trim();
  if(!val||Number(val)<=0){toast(LANG==="ar"?"أدخل قيمة الكليم":"Enter claim value","error");return;}
  if(!days){toast(LANG==="ar"?"أدخل عدد الأيام":"Enter days count","error");return;}
  if(!proj){toast(LANG==="ar"?"أدخل كود المشروع":"Enter project code","error");return;}
  const btn=document.getElementById("cl-submit");if(btn){btn.disabled=true;btn.textContent="⏳...";}
  try{
    await addDoc(collection(db,"claims"),{uid:u.uid,employeeName:u.name,employeeEmail:u.email,value:Number(val),days:Number(days),projectCode:proj,claimDate:date,description:desc||"",status:"pending",createdAt:serverTimestamp()});
    toast(LANG==="ar"?"تم إرسال المطالبة ✅":"Claim submitted ✅");
    STATE.claimTab="history";empClaims();
  }catch(e){toast("Error: "+e.message,"error");if(btn){btn.disabled=false;btn.textContent="📤 "+(LANG==="ar"?"إرسال المطالبة":"Submit Claim");}}
};
window.printMyClaim=async(id)=>{const snap=await getDoc(doc(db,"claims",id));if(!snap.exists())return;const c=snap.data();doPrintClaim(c);};

    <tr><td>${LANG==="ar"?"عدد الأيام":"Number of Days"}</td><td>${c.days||"—"}</td></tr>

  <div class="footer">
    <div class="sig"><div class="sig-line"></div><div class="sig-label">${LANG==="ar"?"توقيع الموظف":"Employee Signature"}</div></div>
